name: Build and publish mock-provider image

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: false

      - name: Test mock-provider
        working-directory: mock-provider
        run: go test ./...

      - name: Test load-probe
        working-directory: tools/load-probe
        run: go test ./...

  image:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.CONTAINER_REGISTRY }}
          username: ${{ vars.CONTAINER_USERNAME }}
          password: ${{ secrets.CONTAINER_PASSWORD }}

      - name: Build and optionally publish image
        uses: docker/build-push-action@v6
        with:
          context: ./mock-provider
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ vars.CONTAINER_REGISTRY }}/${{ vars.CONTAINER_NAMESPACE }}/llm-mock-provider:latest
            ${{ vars.CONTAINER_REGISTRY }}/${{ vars.CONTAINER_NAMESPACE }}/llm-mock-provider:${{ github.sha }}
